<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acceso Estudiantes — UNPHU SIST</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;600;700&family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Roboto', sans-serif;
  height: 100vh;
  display: flex;
  overflow: hidden;
}

/* ── LEFT PANEL ─────────────────────────── */
.left-panel {
  width: calc(100% - 520px);
  min-width: 340px;
  background-color: #2E7D32;
  background-image: url('https://estudiantes.unphusist.unphu.edu.do/assets/img/Background-green.svg');
  background-size: cover;
  background-position: center;
  position: relative;
  display: flex;
  align-items: flex-start;
  padding: 60px 50px;
  overflow: hidden;
  flex-shrink: 0;
}

.geo-1, .geo-2 { display: none; }

.left-content {
  position: relative;
  z-index: 2;
}

.left-title {
  font-family: 'Roboto', sans-serif;
  font-size: 3.4rem;
  font-weight: 700;
  color: white;
  line-height: 1.2;
  border-left: 2px solid white;
  padding-left: 0.5rem;
}

.left-sub {
  font-size: 14px;
  color: rgba(255,255,255,0.70);
  margin-top: 12px;
  padding-left: 22px;
  line-height: 1.6;
}

/* ── RIGHT PANEL ────────────────────────── */
.right-panel {
  width: 520px;
  flex-shrink: 0;
  background-color: #f7faff;
  background-image: url('https://estudiantes.unphusist.unphu.edu.do/assets/img/Trazado.svg');
  background-size: cover;
  background-position: center;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px;
  position: relative;
  height: 100vh;
}

/* ── LOGIN CARD ─────────────────────────── */
.login-card {
  background: white;
  border-radius: 10px;
  box-shadow: 0 2px 6px rgba(35,35,58,0.12);
  padding: 48px 44px 40px;
  width: 80%;
  max-width: 500px;
  position: relative;
  z-index: 1;
  animation: cardIn 0.4s ease;
}

@keyframes cardIn {
  from { opacity:0; transform:translateY(16px); }
  to   { opacity:1; transform:translateY(0); }
}

/* ── LOGO ───────────────────────────────── */
.logo-wrap {
  text-align: center;
  margin-bottom: 36px;
}

.logo-unphu {
  font-family: 'Montserrat', sans-serif;
  font-size: 48px;
  font-weight: 900;
  color: #2E7D32;
  letter-spacing: -0.02em;
  line-height: 1;
}

.logo-sist-wrap {
  display: inline-flex;
  align-items: center;
  justify-content: flex-end;
  width: 100%;
  margin-top: -4px;
}

.logo-sist {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  border: 1.5px solid #1A4B6E;
  border-radius: 4px;
  padding: 2px 10px;
  font-size: 12px;
  font-weight: 700;
  color: #1A4B6E;
  letter-spacing: 0.12em;
  font-family: 'Roboto', sans-serif;
}

/* ── FLOATING LABEL INPUTS ──────────────── */
.field-group {
  position: relative;
  margin-bottom: 20px;
}

.field-group input {
  width: 100%;
  padding: 18px 14px 8px 42px;
  border: 1.5px solid #C8D6E5;
  border-radius: 8px;
  font-size: 14px;
  font-family: 'Roboto', sans-serif;
  color: #1A2233;
  background: #F0F5FA;
  outline: none;
  transition: all 0.2s;
}

.field-group input:focus {
  border-color: #1A4B6E;
  background: white;
  box-shadow: 0 0 0 3px rgba(26,75,110,0.10);
}

.field-group label {
  position: absolute;
  top: 50%;
  left: 42px;
  transform: translateY(-50%);
  font-size: 14px;
  color: #8A9BB0;
  pointer-events: none;
  transition: all 0.18s;
  background: transparent;
  padding: 0 2px;
}

.field-group input:focus ~ label,
.field-group input:not(:placeholder-shown) ~ label {
  top: 10px;
  transform: translateY(0);
  font-size: 10.5px;
  color: #1A4B6E;
  font-weight: 600;
  letter-spacing: 0.04em;
}

.field-ico {
  position: absolute;
  left: 13px;
  top: 50%;
  transform: translateY(-50%);
  color: #8A9BB0;
  font-size: 17px;
  pointer-events: none;
  transition: color 0.18s;
}

.field-group input:focus ~ .field-ico { color: #1A4B6E; }

/* SVG icons inline */
.ico-user, .ico-lock {
  width: 18px; height: 18px;
  fill: none; stroke: currentColor;
  stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round;
}

/* Toggle password */
.toggle-pw {
  position: absolute;
  right: 12px; top: 50%; transform: translateY(-50%);
  background: none; border: none;
  color: #8A9BB0; cursor: pointer;
  padding: 2px; transition: color 0.15s;
}
.toggle-pw:hover { color: #1A4B6E; }

/* Forgot password */
.forgot-link {
  display: block;
  text-align: right;
  font-size: 12.5px;
  color: #1A4B6E;
  margin-top: -8px;
  margin-bottom: 24px;
  cursor: pointer;
  transition: opacity 0.15s;
}
.forgot-link:hover { opacity: 0.75; text-decoration: underline; }

/* Error */
.error-msg {
  background: rgba(229,62,62,0.08);
  border: 1px solid rgba(229,62,62,0.28);
  border-radius: 7px;
  padding: 9px 13px;
  font-size: 12.5px;
  color: #C53030;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 7px;
}

/* Submit button */
.btn-ingresar {
  width: 100%;
  padding: 14px;
  background: #1A3A5C;
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 15px;
  font-weight: 600;
  font-family: 'Roboto', sans-serif;
  cursor: pointer;
  letter-spacing: 0.02em;
  transition: background 0.18s, transform 0.12s;
  margin-bottom: 22px;
}
.btn-ingresar:hover  { background: #0F2D4F; }
.btn-ingresar:active { transform: scale(0.98); }

/* Admin link */
.admin-link-row {
  text-align: center;
  font-size: 12.5px;
  color: #8A9BB0;
  border-top: 1px solid #EDF2F7;
  padding-top: 18px;
}
.admin-link-row a {
  color: #2E7D32;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.15s;
}
.admin-link-row a:hover { opacity: 0.75; text-decoration: underline; }

/* Demo box */
.demo-box {
  background: #F7FAFC;
  border: 1px solid #E2E8F0;
  border-radius: 7px;
  padding: 10px 13px;
  margin-bottom: 18px;
}
.demo-title {
  font-size: 10.5px;
  font-weight: 700;
  color: #4A5568;
  margin-bottom: 6px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}
.demo-cred {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 4px;
}
.demo-chip {
  padding: 2px 9px;
  border-radius: 10px;
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.15s;
  user-select: none;
}
.demo-chip:hover { opacity: 0.80; }
.chip-green { background: rgba(46,125,50,0.12); color: #2E7D32; }
.demo-text  { font-size: 11.5px; color: #718096; }
</style>
</head>
<body>

<!-- LEFT PANEL -->
<div class="left-panel">
  <div class="geo-1"></div>
  <div class="geo-2"></div>
  <div class="left-content">
    <div class="left-title">Acceso<br>Estudiantes</div>
    <div class="left-sub">
      Portal académico UNPHU<br>
      Sistema de Gestión Estudiantil
    </div>
  </div>
</div>

<!-- RIGHT PANEL -->
<div class="right-panel">
  <div class="login-card">

    <!-- Logo -->
    <div class="logo-wrap">
      <img src="https://estudiantes.unphusist.unphu.edu.do/assets/img/unphusist-logo.svg"
           alt="UNPHU SIST" style="width:220px;max-width:100%;margin-bottom:4px;">
    </div>

    {% if messages %}
    {% for msg in messages %}
    <div class="error-msg">
      <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      {{ msg }}
    </div>
    {% endfor %}
    {% endif %}

    <form method="POST" id="loginForm">
      {% csrf_token %}

      <!-- Usuario -->
      <div class="field-group">
        <input type="text" name="username" id="username"
               placeholder=" " autocomplete="username" required
               value="{{ request.POST.username|default:'' }}">
        <label for="username">Usuario</label>
        <span class="field-ico">
          <svg class="ico-user" viewBox="0 0 24 24"><circle cx="12" cy="7" r="4"/><path d="M4 21v-1a8 8 0 0116 0v1"/></svg>
        </span>
      </div>

      <!-- Contraseña -->
      <div class="field-group">
        <input type="password" name="password" id="password"
               placeholder=" " autocomplete="current-password" required>
        <label for="password">Contraseña</label>
        <span class="field-ico">
          <svg class="ico-lock" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
        </span>
        <button type="button" class="toggle-pw" onclick="togglePw()" id="eyeBtn">
          <svg id="eyeIcon" viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>

      <a class="forgot-link">¿Olvidaste tu contraseña?</a>

      <!-- Demo credentials -->
      <div class="demo-box">
        <div class="demo-title">💡 Demo rápido</div>
        <div class="demo-cred">
          <span class="demo-chip chip-green" onclick="fill('nr21-2021','Demo2026!')">Estudiante</span>
          <span class="demo-text">nr21-2021 / Demo2026!</span>
        </div>
      </div>

      <button type="submit" class="btn-ingresar">Ingresar</button>

      <div class="admin-link-row">
        ¿Eres personal de Registro?
        <a href="/admin-login/">Acceso Administrativo →</a>
      </div>
    </form>

  </div>
</div>

<script>
function togglePw() {
  const inp  = document.getElementById('password');
  const icon = document.getElementById('eyeIcon');
  if (inp.type === 'password') {
    inp.type = 'text';
    icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>';
  } else {
    inp.type = 'password';
    icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
  }
}

function fill(u, p) {
  document.getElementById('username').value = u;
  document.getElementById('password').value = p;
  document.getElementById('loginForm').submit();
}
</script>
</body>
</html>
